name: Build Padavan Firmware

on:
  workflow_dispatch:  # Manual trigger from GitHub Actions UI
  push:
    tags:
      - '*'  # Auto-trigger when pushing tags like v1.0.0

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng  # Pre-configured build environment
    defaults: { run: { shell: bash } }
    
    strategy:
      matrix:
        device: [RT-N11P, RT-N11PB1]  # Build both devices in parallel
        include:
          - device: RT-N11P
            config_file: rt-n11p-fix.config  # Custom config for RT-N11P
          - device: RT-N11PB1
            config_file: rt-n11pb1-fix.config  # Custom config for RT-N11PB1
    
    name: Build ${{ matrix.device }}  # Job name shows which device is building
    
    steps:
    - uses: actions/checkout@v4  # Checkout repository code

    - name: Check config files exist
      run: |
        if [ ! -f "${{ matrix.config_file }}" ]; then
          echo "ERROR: Config file ${{ matrix.config_file }} not found!"
          ls -la *.config || echo "No config files in repository"
          exit 1
        fi
        echo "Using config file: ${{ matrix.config_file }}"

    - name: Get variables
      run: |
        # Check if variables file exists (contains repository URLs, branch info, etc.)
        if [ ! -f variables ]; then
          echo "ERROR: variables file not found!"
          exit 1
        fi
        
        # Convert Windows line endings to Unix and load variables
        sed -i 's|\r$||g' variables
        . variables
        
        # Export PADAVAN variables to GitHub environment
        PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
        for v in "${!PADAVAN_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done
        
        echo "DEVICE=${{ matrix.device }}" >> $GITHUB_ENV
        echo "CONFIG_FILE=${{ matrix.config_file }}" >> $GITHUB_ENV

    - name: Download sources and toolchain
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"  # Clone Padavan source code
        git -C padavan-ng checkout "$PADAVAN_COMMIT"     # Checkout specific commit
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -  # Download and extract toolchain

    - name: Install themes
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

          for theme in $PADAVAN_THEMES; do
            echo "Installing $theme theme"
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Run custom pre-build script
      run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'  # Optional pre-build customization

    - name: Load device config
      run: |
        # Load device-specific configuration from custom config file
        sed -i 's|\r$||g' "${{ matrix.config_file }}"
        . "${{ matrix.config_file }}"
        
        # Export CONFIG variables to GitHub environment
        for v in "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done
        
        echo "Loaded config for: $CONFIG_FIRMWARE_PRODUCT_ID"
        echo "Vendor: $CONFIG_VENDOR"

    - name: Build ${{ matrix.device }} firmware
      run: |
        # Copy custom config to Padavan build directory
        cp "${{ matrix.config_file }}" padavan-ng/trunk/.config
        
        cd padavan-ng/trunk
        ./clear_tree.sh          # Clean previous build
        ./build_firmware.sh      # Start firmware compilation

        # Find the generated firmware file
        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
        
        # Rename with device name for clarity
        NEW_NAME="${FW_FILE_NAME%.*}_${{ matrix.device }}.${FW_FILE_NAME##*.}"
        cp "images/$FW_FILE_NAME" "images/$NEW_NAME"
        echo "FW_FILE_NAME=$NEW_NAME" >> $GITHUB_ENV
        echo "ORIGINAL_FW_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    - name: Run custom post-build script
      run: '[[ -f post-build.sh ]] && . post-build.sh || :'  # Optional post-build customization

    - name: Prepare ${{ matrix.device }} artifact
      run: |
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" "${{ matrix.device }}.bin"
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Upload ${{ matrix.device }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.device }}_firmware_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ matrix.device }}.bin
          ${{ matrix.config_file }}  # Include config file for reference

    - name: Check ${{ matrix.device }} firmware size
      run: |
        # Find partitions config file for size validation
        partitions=padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/${{ matrix.device }}/partitions.config
        if [ ! -f "$partitions" ]; then
          partitions=padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config
        fi
        
        if [ -f "$partitions" ]; then
          max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
          fw_size="$(stat -c %s "${{ matrix.device }}.bin")"

          if ((fw_size > max_fw_size)); then
            fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
            max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
            echo "Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for ${{ matrix.device }}"
            exit 1
          fi
        else
          echo "Warning: partitions.config not found for ${{ matrix.device }}, skipping size check"
        fi

  create-release:
    runs-on: ubuntu-latest
    needs: build  # Wait for all build jobs to complete
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')  # Only run on tag pushes
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/*.bin  # Include all firmware files
        generate_release_notes: true  # Auto-generate release notes