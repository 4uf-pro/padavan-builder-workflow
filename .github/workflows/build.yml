name: Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (remove cache)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    
    strategy:
      matrix:
        config: 
          - name: "RT-N11P (A1)"
            file: rt-n11p-fix.config
            revision: "A1"
          - name: "RT-N11PB1 (B1)"
            file: rt-n11pb1-fix.config
            revision: "B1"
      max-parallel: 1
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: 'src'

    - name: Validate configuration files
      run: |
        echo "========================================"
        echo "VALIDATING CONFIGURATION FILES"
        echo "========================================"
        cd src
        if [[ ! -f "variables" ]] || [[ ! -f "${{ matrix.file }}" ]]; then
          echo "[ERROR] Required files not found"
          exit 1
        fi
        echo "[OK] All configuration files are present"

    - name: Load configuration
      id: config
      run: |
        echo "========================================"
        echo "LOADING CONFIGURATION"
        echo "========================================"
        cd src
        sed -i 's|\r$||g' variables "${{ matrix.file }}"
        source variables
        source "${{ matrix.file }}"
        
        if [[ -z "$PADAVAN_REPO" ]] || [[ -z "$PADAVAN_BRANCH" ]] || [[ -z "$CONFIG_VENDOR" ]] || [[ -z "$CONFIG_FIRMWARE_PRODUCT_ID" ]]; then
          echo "[ERROR] Required variables not set"
          exit 1
        fi
        
        echo "CONFIG_FILE=${{ matrix.file }}" >> $GITHUB_ENV
        echo "CONFIG_REVISION=${{ matrix.revision }}" >> $GITHUB_ENV
        echo "CONFIG_NAME=${{ matrix.name }}" >> $GITHUB_ENV
        echo "PADAVAN_REPO=$PADAVAN_REPO" >> $GITHUB_ENV
        echo "PADAVAN_BRANCH=$PADAVAN_BRANCH" >> $GITHUB_ENV
        echo "CONFIG_VENDOR=$CONFIG_VENDOR" >> $GITHUB_ENV
        echo "CONFIG_FIRMWARE_PRODUCT_ID=$CONFIG_FIRMWARE_PRODUCT_ID" >> $GITHUB_ENV
        
        echo "[OK] Configuration loaded: ${{ matrix.name }}"

    - name: Setup build environment
      run: |
        echo "========================================"
        echo "SETTING UP BUILD ENVIRONMENT"
        echo "========================================"
        git clone -b "$PADAVAN_BRANCH" --depth 1 "$PADAVAN_REPO" padavan-ng
        echo "[OK] Build environment ready"

    - name: Build firmware
      run: |
        echo "========================================"
        echo "BUILDING FIRMWARE"
        echo "========================================"
        echo "Building: ${{ matrix.name }}"
        
        cp "src/${{ matrix.file }}" padavan-ng/trunk/.config
        cd padavan-ng/trunk
        
        echo "Starting firmware build..."
        START_TIME=$(date +%s)
        ./build_firmware.sh
        END_TIME=$(date +%s)
        BUILD_DURATION=$((END_TIME - START_TIME))
        
        echo "Build completed in ${BUILD_DURATION} seconds"
        
        FW_FILE_PATH=$(find images -type f \( -name "*.trx" -o -name "*.bin" \) | head -1)
        if [[ -z "$FW_FILE_PATH" ]]; then
          echo "[ERROR] Firmware file not found!"
          exit 1
        fi
        
        echo "BUILD_DURATION=$BUILD_DURATION" >> $GITHUB_ENV
        echo "FW_FILE_PATH=$FW_FILE_PATH" >> $GITHUB_ENV
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Prepare firmware package
      run: |
        echo "========================================"
        echo "PREPARING FIRMWARE PACKAGE"
        echo "========================================"
        
        PADAVAN_VERSION="3.4.3.9"
        COMMIT_HASH_SHORT=$(git -C padavan-ng rev-parse --short HEAD)
        PACKAGE_NAME="${CONFIG_VENDOR}_${CONFIG_FIRMWARE_PRODUCT_ID}_Padavan_${PADAVAN_VERSION}-${COMMIT_HASH_SHORT}_${BUILD_TIMESTAMP}"
        
        cp "$FW_FILE_PATH" "firmware.trx"
        cp "src/${{ matrix.file }}" "build.config"
        
        echo "PACKAGE_NAME=${PACKAGE_NAME}.zip" >> $GITHUB_ENV
        echo "FIRMWARE_VERSION=${PADAVAN_VERSION}" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}
        path: ${{ env.PACKAGE_NAME }}
        retention-days: 30

    - name: Success summary
      if: success()
      run: |
        echo "========================================"
        echo "SUCCESS: BUILD COMPLETED"
        echo "========================================"
        echo ""
        echo "RESULT:"
        echo "  Firmware: ${{ matrix.name }}"
        echo "  Package:  ${{ env.PACKAGE_NAME }}"
        echo "  Version:  ${{ env.FIRMWARE_VERSION }}"
        echo "  Time:     ${{ env.BUILD_DURATION }} seconds"
        echo ""
        echo "Firmware is ready for use!"
        echo "========================================"

    - name: Failure summary
      if: failure()
      run: |
        echo "========================================"
        echo "FAILURE: BUILD FAILED"
        echo "========================================"
        echo "Build failed for: ${{ matrix.name }}"