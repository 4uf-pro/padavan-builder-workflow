name: Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Clean build (remove cache)'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: 
      run: 
        shell: bash
    strategy:
      matrix:
        config: 
          - name: "RT-N11P (A1)"
            file: rt-n11p-fix.config
            revision: "A1"
          - name: "RT-N11PB1 (B1)"
            file: rt-n11pb1-fix.config
            revision: "B1"
      # Build sequentially for better log readability
      max-parallel: 1
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        path: 'src'

    - name: Validate configuration files
      run: |
        echo "========================================================"
        echo "VALIDATING CONFIGURATION FILES"
        echo "========================================================"
        
        cd src
        
        # List of required files
        REQUIRED_FILES=("variables" "${{ matrix.file }}")
        
        for file in "${REQUIRED_FILES[@]}"; do
          if [[ ! -f "$file" ]]; then
            echo "[ERROR] Required file not found: $file"
            exit 1
          fi
          echo "[OK] Found file: $file"
        done
        
        echo "All configuration files are present"

    - name: Load configuration
      id: config
      run: |
        echo "========================================================"
        echo "LOADING CONFIGURATION"
        echo "========================================================"
        
        cd src
        
        # Remove CRLF for Windows compatibility
        sed -i 's|\r$||g' variables ${{ matrix.file }}
        
        # Load variables from files
        . <(cat variables ${{ matrix.file }})
        
        # Check required variables
        REQUIRED_VARS=("PADAVAN_REPO" "PADAVAN_BRANCH" "PADAVAN_TOOLCHAIN_URL" 
                      "CONFIG_VENDOR" "CONFIG_FIRMWARE_PRODUCT_ID")
        
        for var in "${REQUIRED_VARS[@]}"; do
          if [[ -z "${!var}" ]]; then
            echo "[ERROR] Required variable not set: $var"
            exit 1
          fi
        done
        
        # Convert themes array to string (if exists)
        if [[ ${#PADAVAN_THEMES[@]} -gt 0 ]]; then
          THEMES_STRING=$(IFS=' '; echo "${PADAVAN_THEMES[*]}")
        else
          THEMES_STRING=""
        fi
        
        # Export variables to GitHub Actions environment
        {
          echo "CONFIG_FILE=${{ matrix.file }}"
          echo "CONFIG_REVISION=${{ matrix.revision }}"
          echo "CONFIG_NAME=${{ matrix.name }}"
          echo "THEMES_STRING=$THEMES_STRING"
          
          # Export all PADAVAN_ and CONFIG_ variables
          for v in $(compgen -v | grep -E '^(PADAVAN|CONFIG)_'); do
            if [[ -n "${!v}" ]]; then
              echo "$v=${!v}"
            fi
          done
        } >> $GITHUB_ENV
        
        echo "[OK] Configuration loaded: ${{ matrix.name }}"
        echo "Model: $CONFIG_VENDOR $CONFIG_FIRMWARE_PRODUCT_ID"
        echo "Themes: ${THEMES_STRING:-classic Padavan}"

    - name: Setup build environment
      run: |
        echo "========================================================"
        echo "SETTING UP BUILD ENVIRONMENT"
        echo "========================================================"
        
        echo "Cloning Padavan-NG repository..."
        git clone -b "$PADAVAN_BRANCH" --depth 1 "$PADAVAN_REPO" padavan-ng
        
        if [[ -n "$PADAVAN_COMMIT" && "$PADAVAN_COMMIT" != "HEAD" ]]; then
          echo "Checking out commit: $PADAVAN_COMMIT"
          git -C padavan-ng checkout "$PADAVAN_COMMIT"
        fi
        
        echo "Downloading toolchain..."
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -
        
        echo "[OK] Build environment ready"

    - name: Optimize firmware size
      run: |
        echo "========================================================"
        echo "OPTIMIZING FIRMWARE SIZE"
        echo "========================================================"
        
        echo "Keeping languages: EN (English), RU (Russian), UK (Ukrainian)"
        
        # Language files directory
        LANG_DIR="padavan-ng/trunk/user/www/n56u_ribbon_fixed/lang"
        
        if [[ -d "$LANG_DIR" ]]; then
          cd "$LANG_DIR"
          
          echo "Language files before optimization:"
          ls -la *.js 2>/dev/null | wc -l | awk '{print "  Found files: "$1}' || echo "  No files found"
          
          # Remove all languages except needed ones
          echo "Removing extra languages..."
          find . -maxdepth 1 -name "*.js" ! -name 'EN.js' ! -name 'RU.js' ! -name 'UK.js' -delete 2>/dev/null || true
          
          echo "Language files after optimization:"
          ls -la *.js 2>/dev/null | awk '{print "  " $9}' || echo "  No files"
        else
          echo "[WARNING] Language directory not found: $LANG_DIR"
        fi
        
        # Remove demo files to save space
        DEMO_DIR="padavan-ng/trunk/user/www/n56u_ribbon_fixed/demo"
        if [[ -d "$DEMO_DIR" ]]; then
          echo "Removing demo files..."
          rm -rf "$DEMO_DIR"
        fi
        
        echo "[OK] Optimization complete"

    - name: Install themes (optional)
      if: env.THEMES_STRING != ''
      run: |
        echo "========================================================"
        echo "INSTALLING THEMES"
        echo "========================================================"
        
        echo "Cloning themes repository..."
        git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
        
        # Copy common files
        if [[ -f "themes/jquery.js" ]]; then
          echo "Copying jquery.js..."
          cp themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed/
        fi
        
        if [[ -d "themes/common-theme" ]]; then
          echo "Copying common-theme..."
          cp -r themes/common-theme padavan-ng/trunk/user/www/n56u_ribbon_fixed/
        fi
        
        # Install selected themes
        for theme in $THEMES_STRING; do
          THEME_DIR="themes/${theme}-theme"
          if [[ -d "$THEME_DIR" ]]; then
            echo "Installing theme: $theme"
            cp -r "$THEME_DIR" padavan-ng/trunk/user/www/n56u_ribbon_fixed/
          else
            echo "[WARNING] Theme directory not found: $THEME_DIR"
          fi
        done
        
        echo "[OK] Themes installed"

    - name: Execute pre-build script (optional)
      if: hashFiles('src/pre-build.sh')
      run: |
        echo "========================================================"
        echo "EXECUTING PRE-BUILD SCRIPT"
        echo "========================================================"
        cd src
        chmod +x pre-build.sh
        ./pre-build.sh

    - name: Build firmware
      run: |
        echo "========================================================"
        echo "BUILDING FIRMWARE"
        echo "========================================================"
        
        echo "Building: ${{ matrix.name }}"
        echo "Config: ${{ matrix.file }}"
        
        # Copy configuration
        cp "src/${{ matrix.file }}" padavan-ng/trunk/.config
        
        # Go to build directory
        cd padavan-ng/trunk
        
        # Clean build tree
        echo "Cleaning build tree..."
        ./clear_tree.sh
        
        # Start build
        echo "Starting firmware build..."
        START_TIME=$(date +%s)
        START_READABLE=$(date '+%H:%M:%S')
        
        ./build_firmware.sh
        
        END_TIME=$(date +%s)
        END_READABLE=$(date '+%H:%M:%S')
        BUILD_DURATION=$((END_TIME - START_TIME))
        
        echo "Build completed in ${BUILD_DURATION} seconds"
        echo "Start: $START_READABLE, End: $END_READABLE"
        
        # Find built firmware file
        FW_FILE_PATH=$(find images -type f \( -name "*.trx" -o -name "*.bin" \) | head -1)
        
        if [[ -z "$FW_FILE_PATH" ]]; then
          echo "[ERROR] Firmware file not found!"
          exit 1
        fi
        
        FW_FILE_NAME=$(basename "$FW_FILE_PATH")
        FW_FILE_SIZE=$(stat -c %s "$FW_FILE_PATH")
        
        echo "[OK] Firmware built: $FW_FILE_NAME"
        echo "Size: $(numfmt --to=iec-i $FW_FILE_SIZE) ($FW_FILE_SIZE bytes)"
        
        # Export build information
        {
          echo "FW_FILE_NAME=$FW_FILE_NAME"
          echo "FW_FILE_PATH=$FW_FILE_PATH"
          echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')"
          echo "BUILD_DURATION=$BUILD_DURATION"
        } >> $GITHUB_ENV

    - name: Execute post-build script (optional)
      if: hashFiles('src/post-build.sh')
      run: |
        echo "========================================================"
        echo "EXECUTING POST-BUILD SCRIPT"
        echo "========================================================"
        cd src
        chmod +x post-build.sh
        ./post-build.sh

    - name: Prepare firmware package
      run: |
        echo "========================================================"
        echo "PREPARING FIRMWARE PACKAGE"
        echo "========================================================"
        
        # Get build metadata
        cd padavan-ng
        PADAVAN_VERSION=$(grep -oP '^RT_SOFT_VER\s*=\s*\K[^#]+' trunk/configs/templates/version.mk | head -1 | tr -d '"' | xargs)
        COMMIT_HASH_SHORT=$(git rev-parse --short HEAD)
        cd ..
        
        # Format package name as required
        PACKAGE_NAME="${CONFIG_VENDOR}_${CONFIG_FIRMWARE_PRODUCT_ID}_Padavan_${PADAVAN_VERSION}-${COMMIT_HASH_SHORT}_${BUILD_TIMESTAMP}"
        
        echo "Package name: $PACKAGE_NAME"
        echo "Firmware version: $PADAVAN_VERSION"
        echo "Commit: $COMMIT_HASH_SHORT"
        
        # Copy files
        cp "$FW_FILE_PATH" "firmware.trx"
        cp "src/${{ matrix.file }}" "build.config"
        
        # Create README file with information
        cat > README.txt << EOF
Padavan Firmware for $CONFIG_FIRMWARE_PRODUCT_ID (${{ matrix.revision }})
================================================================

BUILD INFORMATION:
- Model: $CONFIG_FIRMWARE_PRODUCT_ID
- Revision: ${{ matrix.revision }}
- Vendor: $CONFIG_VENDOR
- Version: $PADAVAN_VERSION
- Build Date: $BUILD_TIMESTAMP
- Build Duration: ${BUILD_DURATION} seconds
- Commit: $COMMIT_HASH_SHORT

FEATURES:
- YouTube bypass support
- Optimized size
- Russian, Ukrainian and English interface
- Classic Padavan theme
- DNSCrypt and Stubby for secure DNS
- OpenVPN and WireGuard VPN

INSTALLATION:
1. Extract this archive
2. Upload firmware.trx through router web interface
3. Default credentials: admin/admin

IMPORTANT:
- Always backup current configuration
- Reset to defaults after flashing
- For ${{ matrix.revision }} revision only
EOF
        
        # Create ZIP archive
        echo "Creating ZIP archive: ${PACKAGE_NAME}.zip"
        zip -j "${PACKAGE_NAME}.zip" "firmware.trx" "build.config" "README.txt"
        
        ARCHIVE_SIZE=$(stat -c %s "${PACKAGE_NAME}.zip")
        
        echo "[OK] Package created: ${PACKAGE_NAME}.zip"
        echo "Archive size: $(numfmt --to=iec-i $ARCHIVE_SIZE)"
        echo "Archive contents:"
        unzip -l "${PACKAGE_NAME}.zip" | tail -5
        
        # Export package name
        echo "PACKAGE_NAME=${PACKAGE_NAME}.zip" >> $GITHUB_ENV
        echo "FIRMWARE_VERSION=${PADAVAN_VERSION}" >> $GITHUB_ENV

    - name: Check firmware size
      run: |
        echo "========================================================"
        echo "CHECKING FIRMWARE SIZE"
        echo "========================================================"
        
        # Find partitions.config file
        PARTITIONS_FILE=$(find padavan-ng/trunk/configs/boards -name "partitions.config" -path "*${CONFIG_FIRMWARE_PRODUCT_ID}*" 2>/dev/null | head -1)
        
        if [[ -f "$PARTITIONS_FILE" ]]; then
          echo "Found partitions file: $PARTITIONS_FILE"
          
          MAX_SIZE=$(awk '/Firmware/ {getline; getline; sub(",", ""); print strtonum($2)}' "$PARTITIONS_FILE" 2>/dev/null || echo "0")
          
          if [[ $MAX_SIZE -gt 0 ]]; then
            ACTUAL_SIZE=$(stat -c %s "firmware.trx")
            
            echo "Size check:"
            echo "  Maximum: $(numfmt --to=iec-i $MAX_SIZE)"
            echo "  Actual:  $(numfmt --to=iec-i $ACTUAL_SIZE)"
            
            if (( ACTUAL_SIZE > MAX_SIZE )); then
              EXCESS=$((ACTUAL_SIZE - MAX_SIZE))
              echo "[ERROR] Firmware exceeds maximum size!"
              echo "  Excess: $(numfmt --to=iec-i $EXCESS)"
              exit 1
            else
              FREE_SPACE=$((MAX_SIZE - ACTUAL_SIZE))
              USAGE_PERCENT=$((ACTUAL_SIZE * 100 / MAX_SIZE))
              echo "[OK] Size is OK"
              echo "  Used: $USAGE_PERCENT%"
              echo "  Free: $(numfmt --to=iec-i $FREE_SPACE)"
            fi
          else
            echo "[WARNING] Could not determine maximum size"
          fi
        else
          echo "[WARNING] partitions.config file not found"
          echo "[INFO] Skipping size check"
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PACKAGE_NAME }}
        path: ${{ env.PACKAGE_NAME }}
        retention-days: 30
        compression-level: 9

    - name: Cleanup temporary files
      if: always()
      run: |
        echo "========================================================"
        echo "CLEANING TEMPORARY FILES"
        echo "========================================================"
        
        echo "Removing temporary files..."
        rm -f firmware.trx build.config README.txt "${{ env.PACKAGE_NAME }}" 2>/dev/null || true
        rm -rf themes padavan-ng 2>/dev/null || true
        echo "[OK] Cleanup complete"

    - name: Build summary
      if: always()
      run: |
        echo "========================================================"
        if [[ "${{ job.status }}" == "success" ]]; then
          echo "SUCCESS: BUILD COMPLETED"
        else
          echo "FAILURE: BUILD FAILED"
        fi
        echo "========================================================"
        
        if [[ "${{ job.status }}" == "success" ]]; then
          echo ""
          echo "RESULT:"
          echo "  Firmware: ${{ matrix.name }}"
          echo "  Package:  ${{ env.PACKAGE_NAME }}"
          echo "  Version:  ${{ env.FIRMWARE_VERSION }}"
          echo "  Time:     ${BUILD_DURATION} seconds"
          echo ""
          echo "Firmware is ready for use!"
        else
          exit 1
        fi