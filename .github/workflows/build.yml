name: Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Perform clean build'
        required: false
        default: false
        type: boolean
  
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: "ASUS RT-N11P (Revision A1)"
            config_file: "rt-n11p-fix.config"
            board: "RT-N11P"
            revision: "A1"
          
          - name: "ASUS RT-N11P B1 (Revision B1)"
            config_file: "rt-n11pb1-fix.config"
            board: "RT-N11PB1"
            revision: "B1"
    
    steps:
      # 1. ПОДГОТОВКА
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: 'source'
      
      - name: Validate configuration
        id: validate
        run: |
          cd source
          
          REQUIRED_FILES=("variables" "${{ matrix.config_file }}")
          for file in "${REQUIRED_FILES[@]}"; do
            if [[ ! -f "$file" ]]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
            echo "OK: Found: $file"
          done
          
          echo "validation=passed" >> $GITHUB_OUTPUT
      
      # 2. ЗАГРУЗКА КОНФИГОВ
      - name: Load build configuration
        id: config
        run: |
          cd source
          
          # Безопасная загрузка variables
          set -o allexport
          source variables
          set +o allexport
          
          # Загрузка конфига устройства
          CONFIG_VARS=()
          while IFS='=' read -r key value || [[ -n "$key" ]]; do
            # Пропускаем комментарии и пустые строки
            [[ -z "$key" || "$key" =~ ^[[:space:]]*# ]] && continue
            
            # Очищаем значение от кавычек и пробелов
            value="${value%%#*}"  # Удаляем комментарии после значения
            value="${value%"${value##*[![:space:]]}"}"  # Trim trailing spaces
            value="${value#"${value%%[![:space:]]*}"}"  # Trim leading spaces
            value="${value#\"}"
            value="${value%\"}"
            value="${value#\'}"
            value="${value%\'}"
            
            export "$key"="$value"
            CONFIG_VARS+=("$key")
          done < "${{ matrix.config_file }}"
          
          # Проверка обязательных переменных
          REQUIRED_VARS=("PADAVAN_REPO" "PADAVAN_BRANCH" "PADAVAN_TOOLCHAIN_URL" 
                        "CONFIG_VENDOR" "CONFIG_FIRMWARE_PRODUCT_ID")
          
          for var in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!var}" ]]; then
              echo "ERROR: Required variable not set: $var"
              exit 1
            fi
          done
          
          # Экспорт в окружение GitHub
          {
            echo "DEVICE_NAME=${{ matrix.name }}"
            echo "CONFIG_FILE=${{ matrix.config_file }}"
            echo "BOARD=${{ matrix.board }}"
            echo "REVISION=${{ matrix.revision }}"
            echo "PADAVAN_REPO=$PADAVAN_REPO"
            echo "PADAVAN_BRANCH=$PADAVAN_BRANCH"
            echo "PADAVAN_TOOLCHAIN_URL=$PADAVAN_TOOLCHAIN_URL"
            echo "CONFIG_VENDOR=$CONFIG_VENDOR"
            echo "CONFIG_FIRMWARE_PRODUCT_ID=$CONFIG_FIRMWARE_PRODUCT_ID"
          } >> $GITHUB_ENV
          
          echo "Configuration loaded successfully"
          echo "Device: $CONFIG_FIRMWARE_PRODUCT_ID (Rev: ${{ matrix.revision }})"
      
      # 3. ПОДГОТОВКА ОКРУЖЕНИЯ
      - name: Setup build environment
        run: |
          echo "========================================"
          echo "Setting up build environment"
          echo "========================================"
          
          echo "Cloning Padavan-NG repository..."
          git clone -b "$PADAVAN_BRANCH" --depth 1 "$PADAVAN_REPO" padavan-ng
          
          echo "Downloading toolchain..."
          cd padavan-ng
          wget -q --show-progress -O toolchain.tzst "$PADAVAN_TOOLCHAIN_URL"
          tar --zstd -xf toolchain.tzst
          rm -f toolchain.tzst
          cd ..
          
          echo "Build environment ready"
      
      # 4. ОПТИМИЗАЦИЯ (опционально)
      - name: Run optimization script
        continue-on-error: true
        run: |
          if [[ -f "source/pre-build.sh" ]]; then
            echo "Running pre-build optimizations..."
            chmod +x source/pre-build.sh
            cd source
            ./pre-build.sh
            echo "Optimizations completed"
          else
            echo "No optimization script found, skipping..."
          fi
      
      # 5. СБОРКА ПРОШИВКИ
      - name: Build firmware
        id: build
        run: |
          echo "========================================"
          echo "Building firmware for ${{ matrix.name }}"
          echo "========================================"
          
          # Копируем конфигурацию
          cp "source/${{ matrix.config_file }}" padavan-ng/trunk/.config
          
          # Переходим в директорию сборки
          cd padavan-ng/trunk
          
          # Логируем начало сборки
          BUILD_START=$(date +%s)
          echo "Build started at: $(date)"
          
          # Запускаем сборку
          if ./build_firmware.sh; then
            BUILD_STATUS="success"
          else
            BUILD_STATUS="failed"
          fi
          
          # Логируем завершение
          BUILD_END=$(date +%s)
          BUILD_DURATION=$((BUILD_END - BUILD_START))
          
          # Поиск собранной прошивки
          FW_FILE=$(find images -name "*.trx" -o -name "*.bin" | head -1)
          
          # Экспорт результатов
          {
            echo "BUILD_STATUS=$BUILD_STATUS"
            echo "BUILD_DURATION=$BUILD_DURATION"
            echo "FW_FILE=$FW_FILE"
            echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')"
          } >> $GITHUB_ENV
          
          # Проверка результата
          if [[ "$BUILD_STATUS" == "success" && -n "$FW_FILE" ]]; then
            FW_SIZE=$(stat -c%s "$FW_FILE" 2>/dev/null || echo "0")
            echo "Build completed successfully in ${BUILD_DURATION}s"
            echo "Firmware: $(basename "$FW_FILE")"
            echo "Size: $((FW_SIZE / 1024)) KB"
          else
            echo "ERROR: Build failed or firmware not found"
            exit 1
          fi
      
      # 6. ПОДГОТОВКА АРТЕФАКТОВ
      - name: Prepare artifacts
        if: steps.build.outcome == 'success'
        run: |
          echo "Preparing artifacts..."
          
          # Получаем метаданные
          cd padavan-ng
          PADAVAN_VERSION=$(grep '^RT_SOFT_VER' trunk/configs/templates/version.mk | cut -d '"' -f2)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          cd ..
          
          # Формируем имя пакета
          PACKAGE_NAME="${CONFIG_VENDOR}_${CONFIG_FIRMWARE_PRODUCT_ID}_Padavan_${PADAVAN_VERSION}-${COMMIT_HASH}_${BUILD_TIMESTAMP}"
          
          # Создаем README
          cat > README.md << EOF
# Padavan Firmware
## ${CONFIG_FIRMWARE_PRODUCT_ID} (${REVISION})

### Build Information
- **Model:** ${CONFIG_FIRMWARE_PRODUCT_ID}
- **Revision:** ${REVISION}
- **Vendor:** ${CONFIG_VENDOR}
- **Firmware Version:** ${PADAVAN_VERSION}
- **Build Date:** ${BUILD_TIMESTAMP}
- **Build Duration:** ${BUILD_DURATION} seconds
- **Git Commit:** ${COMMIT_HASH}

### Installation
1. Extract the archive
2. Upload the .trx file through router web interface
3. Default credentials: admin/admin

### Notes
- Always backup your current configuration
- Reset to defaults after flashing
- For ${REVISION} revision only
EOF
          
          # Копируем прошивку
          cp "$FW_FILE" "${PACKAGE_NAME}.trx"
          
          # Создаем архив
          zip "${PACKAGE_NAME}.zip" "${PACKAGE_NAME}.trx" README.md
          
          # Экспорт имен файлов
          {
            echo "PACKAGE_NAME=${PACKAGE_NAME}.zip"
            echo "FIRMWARE_FILE=${PACKAGE_NAME}.trx"
            echo "FIRMWARE_VERSION=${PADAVAN_VERSION}"
          } >> $GITHUB_ENV
          
          echo "Artifacts prepared: ${PACKAGE_NAME}.zip"
      
      # 7. ЗАГРУЗКА АРТЕФАКТОВ
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            ${{ env.PACKAGE_NAME }}
            README.md
          retention-days: 30
          compression-level: 9
      
      # 8. ОЧИСТКА
      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up..."
          rm -rf padavan-ng 2>/dev/null || true
          rm -f *.trx *.zip README.md 2>/dev/null || true
      
      # 9. ИТОГИ
      - name: Build summary
        if: always()
        run: |
          echo "========================================"
          echo "BUILD SUMMARY"
          echo "========================================"
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "SUCCESS: Firmware built successfully"
            echo ""
            echo "Device: ${{ matrix.name }}"
            echo "Package: ${{ env.PACKAGE_NAME }}"
            echo "Version: ${{ env.FIRMWARE_VERSION }}"
            echo "Time: ${{ env.BUILD_DURATION }} seconds"
            echo ""
            echo "Firmware is ready for use."
          else
            echo "FAILURE: Build failed"
            echo "Device: ${{ matrix.name }}"
            echo "Status: ${{ job.status }}"
          fi
          echo "========================================"