name: Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Perform clean build (remove cache)'
        required: false
        default: false
        type: boolean
      target_device:
        description: 'Select target device'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - RT-N11P
          - RT-N11PB1
  
  push:
    tags:
      - 'v*'
    branches:
      - main
    paths:
      - '.github/workflows/**'
      - 'rt-*.config'
      - 'variables'

env:
  BUILD_DIR: ${{ github.workspace }}/build
  CACHE_KEY: padavan-build-${{ github.sha }}

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Filter matrix by input
        id: filter
        run: |
          DEVICES=(
            '{"name":"ASUS RT-N11P (Revision A1)","config_file":"rt-n11p-fix.config","board":"RT-N11P","revision":"A1"}'
            '{"name":"ASUS RT-N11P B1 (Revision B1)","config_file":"rt-n11pb1-fix.config","board":"RT-N11PB1","revision":"B1"}'
          )
          
          SELECTED=${{ github.event.inputs.target_device || 'all' }}
          
          if [[ "$SELECTED" == "all" ]]; then
            MATRIX=$(printf '%s\n' "${DEVICES[@]}" | jq -s '.')
          else
            MATRIX=$(printf '%s\n' "${DEVICES[@]}" | jq "select(.board == \"$SELECTED\")" | jq -s '.')
          fi
          
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Selected devices: $SELECTED"
      
      - name: Validate configuration
        run: |
          echo "Validating configuration files..."
          
          for file in variables rt-n11p-fix.config rt-n11pb1-fix.config; do
            if [[ ! -f "$file" ]]; then
              echo "ERROR: Missing required file: $file"
              exit 1
            fi
            echo "Found: $file"
          done
          
          if ! bash -n variables; then
            echo "ERROR: Syntax error in variables file"
            exit 1
          fi
          
          echo "Configuration validation passed"

  build:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        device: ${{ fromJson(needs.setup.outputs.matrix) }}
    
    defaults:
      run:
        shell: bash
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup build environment
        run: |
          echo "Setting up build environment..."
          
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            git \
            wget \
            curl \
            tar \
            zstd \
            libncurses5-dev \
            libncursesw5-dev \
            gawk \
            gettext \
            libssl-dev \
            python3 \
            python3-pip \
            rsync \
            unzip \
            xxd \
            jq \
            file
          
          echo "Build environment setup completed"
      
      - name: Cache build dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            /tmp/toolchain
          key: ${{ env.CACHE_KEY }}
          restore-keys: |
            padavan-build-
      
      - name: Load build configuration
        id: config
        run: |
          echo "Loading build configuration for ${{ matrix.device.name }}"
          
          if [[ ! -f "variables" ]]; then
            echo "ERROR: variables file not found"
            exit 1
          fi
          
          set -o allexport
          source variables 2>/dev/null || {
            echo "ERROR: Failed to load variables file"
            exit 1
          }
          set +o allexport
          
          declare -a REQUIRED_VARS=(
            "PADAVAN_REPO"
            "PADAVAN_BRANCH"
            "PADAVAN_TOOLCHAIN_URL"
          )
          
          for var in "${REQUIRED_VARS[@]}"; do
            if [[ -z "${!var}" ]]; then
              echo "ERROR: Required variable '$var' is not set"
              exit 1
            fi
            echo "$var=${!var}"
          done
          
          {
            echo "DEVICE_NAME=${{ matrix.device.name }}"
            echo "CONFIG_FILE=${{ matrix.device.config_file }}"
            echo "BOARD=${{ matrix.device.board }}"
            echo "REVISION=${{ matrix.device.revision }}"
            echo "PADAVAN_REPO=$PADAVAN_REPO"
            echo "PADAVAN_BRANCH=$PADAVAN_BRANCH"
            echo "PADAVAN_TOOLCHAIN_URL=$PADAVAN_TOOLCHAIN_URL"
          } >> $GITHUB_ENV
          
          echo "Configuration loaded successfully"
      
      - name: Clone Padavan-NG repository
        run: |
          echo "Cloning Padavan-NG repository..."
          
          if [[ -d "padavan-ng" ]]; then
            echo "Repository already exists, cleaning..."
            rm -rf padavan-ng
          fi
          
          git clone \
            --branch "$PADAVAN_BRANCH" \
            --depth 1 \
            --single-branch \
            "$PADAVAN_REPO" \
            padavan-ng
          
          cd padavan-ng
          echo "Commit: $(git rev-parse --short HEAD)"
          cd ..
          
          echo "Repository cloned successfully"
      
      - name: Download and extract toolchain
        run: |
          echo "Setting up toolchain..."
          
          cd padavan-ng
          
          if [[ ! -f "toolchain.tzst" ]]; then
            echo "Downloading toolchain..."
            wget --progress=dot:giga -O toolchain.tzst "$PADAVAN_TOOLCHAIN_URL" || {
              echo "ERROR: Failed to download toolchain"
              exit 1
            }
          fi
          
          echo "Extracting toolchain..."
          tar --zstd -xf toolchain.tzst || {
            echo "ERROR: Failed to extract toolchain"
            exit 1
          }
          
          rm -f toolchain.tzst
          cd ..
          
          echo "Toolchain setup completed"
      
      - name: Run pre-build optimizations
        continue-on-error: true
        run: |
          echo "Running pre-build optimizations..."
          
          if [[ -f "pre-build.sh" ]]; then
            chmod +x pre-build.sh
            ./pre-build.sh
            echo "Pre-build optimizations completed"
          else
            echo "No pre-build script found, skipping..."
          fi
      
      - name: Build firmware
        id: build
        timeout-minutes: 60
        run: |
          echo "Building firmware for ${{ matrix.device.name }}"
          echo "========================================"
          
          START_TIME=$(date +%s)
          
          echo "Using config: $CONFIG_FILE"
          cp "$CONFIG_FILE" padavan-ng/trunk/.config || {
            echo "ERROR: Failed to copy configuration"
            exit 1
          }
          
          cd padavan-ng/trunk
          
          echo "Starting build process..."
          if ./build_firmware.sh; then
            BUILD_STATUS="success"
            echo "Build completed successfully"
          else
            BUILD_STATUS="failed"
            echo "Build failed"
            exit 1
          fi
          
          END_TIME=$(date +%s)
          BUILD_DURATION=$((END_TIME - START_TIME))
          
          FW_FILE=$(find images -name "*.trx" -o -name "*.bin" | head -1)
          
          if [[ -z "$FW_FILE" ]]; then
            echo "ERROR: Firmware file not found"
            exit 1
          fi
          
          FW_SIZE=$(stat -c%s "$FW_FILE" 2>/dev/null || echo "0")
          FW_BASENAME=$(basename "$FW_FILE")
          
          echo "Build Summary:"
          echo "  - Firmware: $FW_BASENAME"
          echo "  - Size: $((FW_SIZE / 1024)) KB"
          echo "  - Duration: ${BUILD_DURATION}s"
          
          {
            echo "BUILD_STATUS=$BUILD_STATUS"
            echo "BUILD_DURATION=$BUILD_DURATION"
            echo "FW_FILE=$FW_FILE"
            echo "FW_SIZE=$FW_SIZE"
            echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')"
          } >> $GITHUB_ENV
      
      - name: Prepare release artifacts
        if: success()
        run: |
          echo "Preparing release artifacts..."
          
          cd padavan-ng
          
          PADAVAN_VERSION=$(grep '^RT_SOFT_VER' trunk/configs/templates/version.mk | cut -d '"' -f2)
          COMMIT_HASH=$(git rev-parse --short HEAD)
          
          cd ..
          
          ARTIFACT_NAME="${CONFIG_VENDOR}_${CONFIG_FIRMWARE_PRODUCT_ID}_Padavan_${PADAVAN_VERSION}-${COMMIT_HASH}_${BUILD_TIMESTAMP}"
          
          cat > README.md << EOF
# Padavan Firmware
## ${CONFIG_FIRMWARE_PRODUCT_ID} (${REVISION})

### Build Information
- Device: ${DEVICE_NAME}
- Model: ${CONFIG_FIRMWARE_PRODUCT_ID}
- Revision: ${REVISION}
- Vendor: ${CONFIG_VENDOR}
- Firmware Version: ${PADAVAN_VERSION}
- Build Date: ${BUILD_TIMESTAMP}
- Build Duration: ${BUILD_DURATION} seconds
- Git Commit: ${COMMIT_HASH}
- File Size: $((FW_SIZE / 1024)) KB

### Installation Instructions
1. Download and extract the ZIP archive
2. Log into your router's web interface
3. Navigate to Firmware Upgrade section
4. Select the .trx file and upload
5. Wait for the router to reboot

### Default Credentials
- Username: admin
- Password: admin

### Important Notes
Always backup your current configuration before flashing
Perform a factory reset after flashing for best results
This firmware is only for ${REVISION} revision

### Support
For issues and questions, please check the repository documentation.
EOF
          
          cp "$FW_FILE" "${ARTIFACT_NAME}.trx"
          sha256sum "${ARTIFACT_NAME}.trx" > "${ARTIFACT_NAME}.sha256"
          
          zip "${ARTIFACT_NAME}.zip" \
            "${ARTIFACT_NAME}.trx" \
            "${ARTIFACT_NAME}.sha256" \
            README.md
          
          {
            echo "ARTIFACT_NAME=${ARTIFACT_NAME}.zip"
            echo "FIRMWARE_FILE=${ARTIFACT_NAME}.trx"
            echo "FIRMWARE_VERSION=${PADAVAN_VERSION}"
          } >> $GITHUB_ENV
          
          echo "Artifacts prepared: ${ARTIFACT_NAME}.zip"
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ env.ARTIFACT_NAME }}
            README.md
            ${{ env.FIRMWARE_FILE }}.sha256
          retention-days: 90
          compression-level: 9
      
      - name: Create GitHub Release (on tag)
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ${{ env.ARTIFACT_NAME }}
            README.md
          generate_release_notes: true
          prerelease: false
      
      - name: Cleanup
        if: always()
        run: |
          echo "Cleaning up temporary files..."
          rm -rf padavan-ng 2>/dev/null || true
          rm -f *.trx *.zip *.sha256 README.md 2>/dev/null || true
          echo "Cleanup completed"
      
      - name: Build summary
        if: always()
        run: |
          echo "========================================"
          echo "BUILD SUMMARY"
          echo "========================================"
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "SUCCESS: Firmware built successfully!"
            echo ""
            echo "Device: ${{ matrix.device.name }}"
            echo "Artifact: ${{ env.ARTIFACT_NAME }}"
            echo "Version: ${{ env.FIRMWARE_VERSION }}"
            echo "Duration: ${{ env.BUILD_DURATION }} seconds"
            echo "Size: $((env.FW_SIZE / 1024)) KB"
            echo ""
            echo "The firmware is ready for download from the artifacts section."
          else
            echo "FAILURE: Build process failed"
            echo ""
            echo "Device: ${{ matrix.device.name }}"
            echo "Status: ${{ job.status }}"
            echo ""
            echo "Check the logs above for detailed error information."
          fi
          
          echo "========================================"