name: Build Padavan Firmware

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  сборка-rt-n11p:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    
    name: Сборка RT-N11P
    
    steps:
    - uses: actions/checkout@v4

    - name: Проверка наличия конфигурационных файлов
      run: |
        if [ ! -f "rt-n11p-fix.config" ]; then
          echo "ОШИБКА: Конфигурационный файл rt-n11p-fix.config не найден!"
          exit 1
        fi

    - name: Загрузка переменных окружения
      run: |
        if [ ! -f variables ]; then
          echo "ОШИБКА: Файл variables не найден!"
          exit 1
        fi
        
        # Преобразование форматов строк и загрузка переменных
        sed -i 's|\r$||g' variables
        . variables
        
        # Экспорт переменных в окружение GitHub Actions
        PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
        for v in "${!PADAVAN_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done
        
        echo "DEVICE=RT-N11P" >> $GITHUB_ENV
        echo "CONFIG_FILE=rt-n11p-fix.config" >> $GITHUB_ENV

    - name: Загрузка исходного кода и инструментов сборки
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

    - name: Установка тем оформления
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

          for theme in $PADAVAN_THEMES; do
            echo "Установка темы: $theme"
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Выполнение пользовательского скрипта предварительной сборки
      run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

    - name: Загрузка конфигурации для RT-N11P
      run: |
        sed -i 's|\r$||g' rt-n11p-fix.config
        . rt-n11p-fix.config
        
        # Экспорт переменных конфигурации
        for v in "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    - name: Компиляция прошивки RT-N11P
      run: |
        cp rt-n11p-fix.config padavan-ng/trunk/.config
        
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        # Поиск созданного файла прошивки
        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Файл прошивки не найден"; exit 1; }
        
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV
        echo "FW_BASENAME=${FW_FILE_NAME%.*}" >> $GITHUB_ENV

    - name: Выполнение пользовательского скрипта пост-сборки
      run: '[[ -f post-build.sh ]] && . post-build.sh || :'

    - name: Создание архива для RT-N11P
      run: |
        # Копирование файлов во временную директорию
        mkdir -p temp_artifact
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" "temp_artifact/"
        cp rt-n11p-fix.config "temp_artifact/build.config"
        
        # Формирование имени архива
        VENDOR_UPPER=$(echo "$CONFIG_VENDOR" | tr '[:lower:]' '[:upper:]')
        TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')
        
        ZIP_NAME="${VENDOR_UPPER}_RT-N11P_Padavan_${FW_BASENAME}_${TIMESTAMP}.zip"
        
        # Создание ZIP-архива (используем Python, так как zip может отсутствовать)
        cd temp_artifact
        python3 -c "import zipfile, sys; zf = zipfile.ZipFile('../$ZIP_NAME', 'w'); \
                    zf.write('$FW_FILE_NAME'); zf.write('build.config'); zf.close()"
        cd ..
        
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "ARTIFACT_NAME=$ZIP_NAME" >> $GITHUB_ENV

    - name: Загрузка артефакта RT-N11P
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        retention-days: 7
        path: ${{ env.ZIP_NAME }}

  сборка-rt-n11pb1:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    
    name: Сборка RT-N11PB1
    
    steps:
    - uses: actions/checkout@v4

    - name: Проверка наличия конфигурационных файлов
      run: |
        if [ ! -f "rt-n11pb1-fix.config" ]; then
          echo "ОШИБКА: Конфигурационный файл rt-n11pb1-fix.config не найден!"
          exit 1
        fi

    - name: Загрузка переменных окружения
      run: |
        if [ ! -f variables ]; then
          echo "ОШИБКА: Файл variables не найден!"
          exit 1
        fi
        
        sed -i 's|\r$||g' variables
        . variables
        
        PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
        for v in "${!PADAVAN_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done
        
        echo "DEVICE=RT-N11PB1" >> $GITHUB_ENV
        echo "CONFIG_FILE=rt-n11pb1-fix.config" >> $GITHUB_ENV

    - name: Загрузка исходного кода и инструментов сборки
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

    - name: Установка тем оформления
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

          for theme in $PADAVAN_THEMES; do
            echo "Установка темы: $theme"
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Выполнение пользовательского скрипта предварительной сборки
      run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

    - name: Загрузка конфигурации для RT-N11PB1
      run: |
        sed -i 's|\r$||g' rt-n11pb1-fix.config
        . rt-n11pb1-fix.config
        
        for v in "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    - name: Компиляция прошивки RT-N11PB1
      run: |
        cp rt-n11pb1-fix.config padavan-ng/trunk/.config
        
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Файл прошивки не найден"; exit 1; }
        
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV
        echo "FW_BASENAME=${FW_FILE_NAME%.*}" >> $GITHUB_ENV

    - name: Выполнение пользовательского скрипта пост-сборки
      run: '[[ -f post-build.sh ]] && . post-build.sh || :'

    - name: Создание архива для RT-N11PB1
      run: |
        # Копирование файлов во временную директорию
        mkdir -p temp_artifact
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" "temp_artifact/"
        cp rt-n11pb1-fix.config "temp_artifact/build.config"
        
        # Формирование имени архива
        VENDOR_UPPER=$(echo "$CONFIG_VENDOR" | tr '[:lower:]' '[:upper:]')
        TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')
        
        ZIP_NAME="${VENDOR_UPPER}_RT-N11PB1_Padavan_${FW_BASENAME}_${TIMESTAMP}.zip"
        
        # Создание ZIP-архива через Python
        cd temp_artifact
        python3 -c "import zipfile, sys; zf = zipfile.ZipFile('../$ZIP_NAME', 'w'); \
                    zf.write('$FW_FILE_NAME'); zf.write('build.config'); zf.close()"
        cd ..
        
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        echo "ARTIFACT_NAME=$ZIP_NAME" >> $GITHUB_ENV

    - name: Загрузка артефакта RT-N11PB1
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        retention-days: 7
        path: ${{ env.ZIP_NAME }}

  создание-релиза:
    runs-on: ubuntu-latest
    needs: [сборка-rt-n11p, сборка-rt-n11pb1]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Загрузка всех артефактов
      uses: actions/download-artifact@v4
      
    - name: Создание релиза
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/*.zip
        generate_release_notes: true