name: 🚀 Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-firmware:
    name: 🛠️ Build ${{ matrix.device_name }}
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    
    strategy:
      fail-fast: false
      matrix:
        config:
          - file: rt-n11p-fix.config
            name: ASUS_RT-N11P
            soc: MT7620
          - file: rt-n11pb1-fix.config
            name: ASUS_RT-N11PB1
            soc: MT7628
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      
      - name: 🔧 Load configuration variables
        id: config
        run: |
          # Convert Windows line endings
          sed -i 's|\r$||g' variables ${{ matrix.config.file }}
          
          # Load variables
          . <(cat variables ${{ matrix.config.file }})
          
          # Export to environment
          PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
          for var_name in "${!PADAVAN_@}" "${!CONFIG_@}"; do
            echo "$var_name=${!var_name}" >> $GITHUB_ENV
          done
          
          # Set build info
          echo "DEVICE_NAME=${{ matrix.config.name }}" >> $GITHUB_ENV
          echo "SOC_TYPE=${{ matrix.config.soc }}" >> $GITHUB_ENV
          echo "CONFIG_FILE=${{ matrix.config.file }}" >> $GITHUB_ENV
      
      - name: 📦 Clone Padavan-NG sources
        run: |
          git config --global --add safe.directory '*'
          git clone --depth 1 -b "$PADAVAN_BRANCH" "$PADAVAN_REPO" padavan-ng
          git -C padavan-ng checkout "$PADAVAN_COMMIT"
          
          # Download toolchain
          echo "📥 Downloading toolchain..."
          wget -q --show-progress -O toolchain.tzst "$PADAVAN_TOOLCHAIN_URL"
          tar --zstd -xf toolchain.tzst -C padavan-ng/
          rm -f toolchain.tzst
      
      - name: 🎨 Install UI themes (optional)
        if: env.PADAVAN_THEMES != ''
        run: |
          echo "🎨 Installing themes: $PADAVAN_THEMES"
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          
          # Copy common theme files
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed/
          
          # Copy selected themes
          for theme in $PADAVAN_THEMES; do
            echo "  → Installing $theme theme"
            cp -r "themes/${theme}-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed/
          done
      
      - name: ⚙️ Run pre-build customization
        run: |
          if [[ -f pre-build.sh ]]; then
            echo "🔧 Running pre-build script..."
            chmod +x pre-build.sh
            source pre-build.sh
          else
            echo "ℹ️  No pre-build script found, skipping."
          fi
      
      - name: 🏗️ Build firmware
        run: |
          echo "🏗️ Building $DEVICE_NAME ($SOC_TYPE)..."
          
          # Prepare build environment
          cp "$CONFIG_FILE" padavan-ng/trunk/.config
          cd padavan-ng/trunk
          
          # Clean previous builds
          ./clear_tree.sh
          
          # Start build process
          echo "🔨 Starting firmware compilation..."
          ./build_firmware.sh
          
          # Find built firmware file
          FW_FILE=$(find images -type f \( -name "*.trx" -o -name "*.bin" \) -printf "%T@\t%p\n" | \
                    sort -nr | head -1 | cut -f2)
          
          if [[ -z "$FW_FILE" || ! -f "$FW_FILE" ]]; then
            echo "❌ ERROR: Firmware file not found!"
            exit 1
          fi
          
          # Extract firmware info
          FW_BASENAME=$(basename "$FW_FILE")
          FW_SIZE=$(stat -c %s "$FW_FILE" | numfmt --to=iec --format="%.2fB")
          
          echo "✅ Firmware built successfully: $FW_BASENAME ($FW_SIZE)"
          echo "FW_FILE_PATH=$FW_FILE" >> $GITHUB_ENV
          echo "FW_BASENAME=$FW_BASENAME" >> $GITHUB_ENV
          echo "FW_SIZE=$FW_SIZE" >> $GITHUB_ENV
      
      - name: 🧹 Run post-build processing
        run: |
          if [[ -f ../post-build.sh ]]; then
            echo "🧹 Running post-build script..."
            chmod +x ../post-build.sh
            source ../post-build.sh
          else
            echo "ℹ️  No post-build script found, skipping."
          fi
      
      - name: 📊 Verify firmware size
        run: |
          echo "📊 Checking firmware size limits..."
          PARTITIONS_FILE="padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"
          
          if [[ -f "$PARTITIONS_FILE" ]]; then
            MAX_SIZE=$(awk '/Firmware/ {getline; getline; gsub(",", ""); print $2}' "$PARTITIONS_FILE")
            ACTUAL_SIZE=$(stat -c %s "$FW_FILE_PATH")
            
            if (( ACTUAL_SIZE > MAX_SIZE )); then
              MAX_SIZE_HR=$(numfmt --to=iec --format="%.2fB" $MAX_SIZE)
              ACTUAL_SIZE_HR=$(numfmt --to=iec --format="%.2fB" $ACTUAL_SIZE)
              echo "❌ ERROR: Firmware size exceeded!"
              echo "   Maximum: $MAX_SIZE_HR"
              echo "   Actual:  $ACTUAL_SIZE_HR"
              echo "   Over by: $(numfmt --to=iec --format="%.2fB" $((ACTUAL_SIZE - MAX_SIZE)))"
              exit 1
            else
              echo "✅ Firmware size check passed"
            fi
          else
            echo "⚠️  Warning: Partitions config not found, size check skipped"
          fi
      
      - name: 📦 Package artifacts
        run: |
          echo "📦 Packaging artifacts..."
          
          # Create unique build identifier
          BUILD_ID=$(date +'%Y%m%d-%H%M%S')
          COMMIT_HASH=$(git -C padavan-ng rev-parse --short HEAD)
          VERSION="3.4.3.9-$COMMIT_HASH"
          
          # Create directory structure
          ARTIFACT_DIR="artifacts/$DEVICE_NAME"
          mkdir -p "$ARTIFACT_DIR"
          
          # Copy firmware
          cp "$FW_FILE_PATH" "$ARTIFACT_DIR/"
          
          # Copy configuration files
          if [[ -f ../$CONFIG_FILE ]]; then
            cp ../$CONFIG_FILE "$ARTIFACT_DIR/"
          fi
          
          # Copy YouTube bypass configs if exist
          for config_file in dnsmasq_youtube.conf youtube_bypass.sh iptables_youtube.sh; do
            if [[ -f ../$config_file ]]; then
              cp ../$config_file "$ARTIFACT_DIR/"
            fi
          done
          
          # Create info file
          cat > "$ARTIFACT_DIR/build-info.txt" << EOF
==========================================
Padavan Firmware Build Information
==========================================
Device:       $DEVICE_NAME
SoC:          $SOC_TYPE
Version:      $VERSION
Build Date:   $(date)
Build ID:     $BUILD_ID
Git Commit:   $COMMIT_HASH
Firmware:     $FW_BASENAME
Size:         $FW_SIZE
Config File:  $CONFIG_FILE
==========================================
EOF
          
          # Create ZIP archive with proper naming
          ZIP_NAME="${DEVICE_NAME}_Padavan_${BUILD_ID}.zip"
          cd artifacts
          zip -r9 "../$ZIP_NAME" "$DEVICE_NAME"
          cd ..
          
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "BUILD_ID=$BUILD_ID" >> $GITHUB_ENV
      
      - name: 📤 Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.DEVICE_NAME }}_${{ env.BUILD_ID }}
          path: |
            ${{ env.ZIP_NAME }}
            artifacts/${{ env.DEVICE_NAME }}/
          retention-days: 30
          if-no-files-found: error
      
      - name: 🏁 Build summary
        if: always()
        run: |
          echo "========================================"
          echo "🏁 BUILD SUMMARY: $DEVICE_NAME"
          echo "========================================"
          echo "✅ Status: ${{ job.status }}"
          echo "📦 Artifact: $ZIP_NAME"
          echo "🔧 Version: $VERSION"
          echo "⏱️  Build ID: $BUILD_ID"
          echo "💾 Firmware: $FW_BASENAME ($FW_SIZE)"
          echo "========================================"
          