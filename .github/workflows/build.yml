name: Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      clean_build:
        description: 'Выполнить чистую сборку (удалить кэш)'
        required: false
        default: false
        type: boolean
  
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    
    strategy:
      fail-fast: false
      matrix:
        device:
          - name: "ASUS RT-N11P (Ревизия A1)"
            config_file: "rt-n11p-fix.config"
            board: "RT-N11P"
            revision: "A1"
          
          - name: "ASUS RT-N11P B1 (Ревизия B1)"
            config_file: "rt-n11pb1-fix.config"
            board: "RT-N11PB1"
            revision: "B1"
    
    steps:
      # ========================
      # 1. ПОДГОТОВИТЕЛЬНЫЕ ДЕЙСТВИЯ
      # ========================
      - name: Клонирование репозитория
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: 'source'
      
      - name: Проверка конфигурационных файлов
        id: validate
        run: |
          cd source
          
          ОБЯЗАТЕЛЬНЫЕ_ФАЙЛЫ=("variables" "${{ matrix.config_file }}")
          for файл in "${ОБЯЗАТЕЛЬНЫЕ_ФАЙЛЫ[@]}"; do
            if [[ ! -f "$файл" ]]; then
              echo "ОШИБКА: Отсутствует обязательный файл: $файл"
              exit 1
            fi
            echo "✓ Найден: $файл"
          done
          
          echo "validation=passed" >> $GITHUB_OUTPUT
      
      # ========================
      # 2. ЗАГРУЗКА КОНФИГУРАЦИИ
      # ========================
      - name: Загрузка параметров сборки
        id: config
        run: |
          cd source
          
          # Безопасная загрузка variables
          set -o allexport
          source variables
          set +o allexport
          
          # Загрузка конфигурации устройства
          КОНФИГ_ПЕРЕМЕННЫЕ=()
          while IFS='=' read -r ключ значение || [[ -n "$ключ" ]]; do
            # Пропускаем комментарии и пустые строки
            [[ -z "$ключ" || "$ключ" =~ ^[[:space:]]*# ]] && continue
            
            # Очистка значения от кавычек и пробелов
            значение="${значение%%#*}"  # Удаление комментариев после значения
            значение="${значение%"${значение##*[![:space:]]}"}"  # Обрезка пробелов справа
            значение="${значение#"${значение%%[![:space:]]*}"}"  # Обрезка пробелов слева
            значение="${значение#\"}"
            значение="${значение%\"}"
            значение="${значение#\'}"
            значение="${значение%\'}"
            
            export "$ключ"="$значение"
            КОНФИГ_ПЕРЕМЕННЫЕ+=("$ключ")
          done < "${{ matrix.config_file }}"
          
          # Проверка обязательных переменных
          ОБЯЗАТЕЛЬНЫЕ_ПЕРЕМЕННЫЕ=("PADAVAN_REPO" "PADAVAN_BRANCH" "PADAVAN_TOOLCHAIN_URL" 
                                  "CONFIG_VENDOR" "CONFIG_FIRMWARE_PRODUCT_ID")
          
          for переменная in "${ОБЯЗАТЕЛЬНЫЕ_ПЕРЕМЕННЫЕ[@]}"; do
            if [[ -z "${!переменная}" ]]; then
              echo "ОШИБКА: Не задана обязательная переменная: $переменная"
              exit 1
            fi
          done
          
          # Экспорт в окружение GitHub
          {
            echo "DEVICE_NAME=${{ matrix.name }}"
            echo "CONFIG_FILE=${{ matrix.config_file }}"
            echo "BOARD=${{ matrix.board }}"
            echo "REVISION=${{ matrix.revision }}"
            echo "PADAVAN_REPO=$PADAVAN_REPO"
            echo "PADAVAN_BRANCH=$PADAVAN_BRANCH"
            echo "PADAVAN_TOOLCHAIN_URL=$PADAVAN_TOOLCHAIN_URL"
            echo "CONFIG_VENDOR=$CONFIG_VENDOR"
            echo "CONFIG_FIRMWARE_PRODUCT_ID=$CONFIG_FIRMWARE_PRODUCT_ID"
          } >> $GITHUB_ENV
          
          echo "Конфигурация успешно загружена"
          echo "Устройство: $CONFIG_FIRMWARE_PRODUCT_ID (Ревизия: ${{ matrix.revision }})"
      
      # ========================
      # 3. ПОДГОТОВКА СРЕДЫ СБОРКИ
      # ========================
      - name: Подготовка среды сборки
        run: |
          echo "========================================"
          echo "Подготовка среды сборки"
          echo "========================================"
          
          echo "Клонирование репозитория Padavan-NG..."
          git clone -b "$PADAVAN_BRANCH" --depth 1 "$PADAVAN_REPO" padavan-ng
          
          echo "Загрузка тулчейна..."
          cd padavan-ng
          wget -q --show-progress -O toolchain.tzst "$PADAVAN_TOOLCHAIN_URL"
          tar --zstd -xf toolchain.tzst
          rm -f toolchain.tzst
          cd ..
          
          echo "Среда сборки готова"
      
      # ========================
      # 4. ОПТИМИЗАЦИЯ (НЕОБЯЗАТЕЛЬНО)
      # ========================
      - name: Выполнение скрипта оптимизации
        continue-on-error: true
        run: |
          if [[ -f "source/pre-build.sh" ]]; then
            echo "Выполнение предсборочной оптимизации..."
            chmod +x source/pre-build.sh
            cd source
            ./pre-build.sh
            echo "Оптимизация завершена"
          else
            echo "Скрипт оптимизации не найден, пропускаем..."
          fi
      
      # ========================
      # 5. СБОРКА ПРОШИВКИ
      # ========================
      - name: Сборка прошивки
        id: build
        run: |
          echo "========================================"
          echo "Сборка прошивки для ${{ matrix.name }}"
          echo "========================================"
          
          # Копирование конфигурации
          cp "source/${{ matrix.config_file }}" padavan-ng/trunk/.config
          
          # Переход в директорию сборки
          cd padavan-ng/trunk
          
          # Логирование начала сборки
          НАЧАЛО_СБОРКИ=$(date +%s)
          echo "Сборка начата: $(date)"
          
          # Запуск сборки
          if ./build_firmware.sh; then
            СТАТУС_СБОРКИ="success"
          else
            СТАТУС_СБОРКИ="failed"
          fi
          
          # Логирование завершения
          КОНЕЦ_СБОРКИ=$(date +%s)
          ДЛИТЕЛЬНОСТЬ_СБОРКИ=$((КОНЕЦ_СБОРКИ - НАЧАЛО_СБОРКИ))
          
          # Поиск собранной прошивки
          ФАЙЛ_ПРОШИВКИ=$(find images -name "*.trx" -o -name "*.bin" | head -1)
          
          # Экспорт результатов
          {
            echo "BUILD_STATUS=$СТАТУС_СБОРКИ"
            echo "BUILD_DURATION=$ДЛИТЕЛЬНОСТЬ_СБОРКИ"
            echo "FW_FILE=$ФАЙЛ_ПРОШИВКИ"
            echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')"
          } >> $GITHUB_ENV
          
          # Проверка результата
          if [[ "$СТАТУС_СБОРКИ" == "success" && -n "$ФАЙЛ_ПРОШИВКИ" ]]; then
            РАЗМЕР_ПРОШИВКИ=$(stat -c%s "$ФАЙЛ_ПРОШИВКИ" 2>/dev/null || echo "0")
            echo "Сборка успешно завершена за ${ДЛИТЕЛЬНОСТЬ_СБОРКИ}с"
            echo "Прошивка: $(basename "$ФАЙЛ_ПРОШИВКИ")"
            echo "Размер: $((РАЗМЕР_ПРОШИВКИ / 1024)) КБ"
          else
            echo "ОШИБКА: Сборка не удалась или прошивка не найдена"
            exit 1
          fi
      
      # ========================
      # 6. ПОДГОТОВКА АРТЕФАКТОВ
      # ========================
      - name: Подготовка артефактов
        if: steps.build.outcome == 'success'
        run: |
          echo "Подготовка артефактов..."
          
          # Получение метаданных
          cd padavan-ng
          ВЕРСИЯ_PADAVAN=$(grep '^RT_SOFT_VER' trunk/configs/templates/version.mk | cut -d '"' -f2)
          ХЭШ_КОММИТА=$(git rev-parse --short HEAD)
          cd ..
          
          # Формирование имени пакета
          ИМЯ_ПАКЕТА="${CONFIG_VENDOR}_${CONFIG_FIRMWARE_PRODUCT_ID}_Padavan_${ВЕРСИЯ_PADAVAN}-${ХЭШ_КОММИТА}_${BUILD_TIMESTAMP}"
          
          # Создание README
          cat > README.md << EOF
# Прошивка Padavan
## ${CONFIG_FIRMWARE_PRODUCT_ID} (${REVISION})

### Информация о сборке
- **Модель:** ${CONFIG_FIRMWARE_PRODUCT_ID}
- **Ревизия:** ${REVISION}
- **Производитель:** ${CONFIG_VENDOR}
- **Версия прошивки:** ${ВЕРСИЯ_PADAVAN}
- **Дата сборки:** ${BUILD_TIMESTAMP}
- **Длительность сборки:** ${BUILD_DURATION} секунд
- **Коммит Git:** ${ХЭШ_КОММИТА}

### Установка
1. Распакуйте архив
2. Загрузите файл .trx через веб-интерфейс роутера
3. Стандартные учётные данные: admin/admin

### Примечания
- Всегда создавайте резервную копию текущей конфигурации
- Выполните сброс к заводским настройкам после прошивки
- Только для ревизии ${REVISION}
EOF
          
          # Копирование прошивки
          cp "$FW_FILE" "${ИМЯ_ПАКЕТА}.trx"
          
          # Создание архива
          zip "${ИМЯ_ПАКЕТА}.zip" "${ИМЯ_ПАКЕТА}.trx" README.md
          
          # Экспорт имён файлов
          {
            echo "PACKAGE_NAME=${ИМЯ_ПАКЕТА}.zip"
            echo "FIRMWARE_FILE=${ИМЯ_ПАКЕТА}.trx"
            echo "FIRMWARE_VERSION=${ВЕРСИЯ_PADAVAN}"
          } >> $GITHUB_ENV
          
          echo "Артефакты подготовлены: ${ИМЯ_ПАКЕТА}.zip"
      
      # ========================
      # 7. ЗАГРУЗКА АРТЕФАКТОВ
      # ========================
      - name: Загрузка артефактов
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}
          path: |
            ${{ env.PACKAGE_NAME }}
            README.md
          retention-days: 30
          compression-level: 9
      
      # ========================
      # 8. ОЧИСТКА
      # ========================
      - name: Очистка временных файлов
        if: always()
        run: |
          echo "Очистка временных файлов..."
          rm -rf padavan-ng 2>/dev/null || true
          rm -f *.trx *.zip README.md 2>/dev/null || true
      
      # ========================
      # 9. ИТОГИ СБОРКИ
      # ========================
      - name: Итоги сборки
        if: always()
        run: |
          echo "========================================"
          echo "ИТОГИ СБОРКИ"
          echo "========================================"
          
          if [[ "${{ job.status }}" == "success" ]]; then
            echo "УСПЕХ: Прошивка успешно собрана"
            echo ""
            echo "Устройство: ${{ matrix.name }}"
            echo "Пакет: ${{ env.PACKAGE_NAME }}"
            echo "Версия: ${{ env.FIRMWARE_VERSION }}"
            echo "Время: ${{ env.BUILD_DURATION }} секунд"
            echo ""
            echo "Прошивка готова к использованию."
          else
            echo "НЕУДАЧА: Сборка не удалась"
            echo "Устройство: ${{ matrix.name }}"
            echo "Статус: ${{ job.status }}"
          fi
          echo "========================================"