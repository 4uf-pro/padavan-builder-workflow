name: Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      devices:
        description: 'Select devices to build (comma-separated)'
        required: false
        default: 'RT-N11P,RT-N11PB1'
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    
    strategy:
      matrix:
        device: [RT-N11P, RT-N11PB1]
    
    name: Build ${{ matrix.device }}
    
    steps:
    - uses: actions/checkout@v4

    - name: Get variables
      run: |
        sed -i 's|\r$||g' variables build.config
        . <(cat variables build.config)
        PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
        for v in "${!PADAVAN_@}" "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done
        echo "DEVICE=${{ matrix.device }}" >> $GITHUB_ENV

    - name: Download sources and toolchain
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

    - name: Install themes
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

          for theme in $PADAVAN_THEMES; do
            echo "Installing $theme theme"
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Run custom pre-build script
      run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

    - name: Configure for ${{ matrix.device }}
      run: |
        CONFIG_FILE="configs/${{ matrix.device }}.config"
        if [ -f "$CONFIG_FILE" ]; then
          cp "$CONFIG_FILE" build.config
        else
          sed -i "s|CONFIG_FIRMWARE_PRODUCT_ID=.*|CONFIG_FIRMWARE_PRODUCT_ID=\"${{ matrix.device }}\"|" build.config
          sed -i "s|CONFIG_VENDOR=.*|CONFIG_VENDOR=\"ASUS\"|" build.config
        fi
        
        . <(cat build.config)
        for v in "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    - name: Build ${{ matrix.device }} firmware
      run: |
        cp build.config padavan-ng/trunk/.config
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
        
        NEW_NAME="${FW_FILE_NAME%.*}_${{ matrix.device }}.${FW_FILE_NAME##*.}"
        cp "images/$FW_FILE_NAME" "images/$NEW_NAME"
        echo "FW_FILE_NAME=$NEW_NAME" >> $GITHUB_ENV
        echo "ORIGINAL_FW_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    - name: Run custom post-build script
      run: '[[ -f post-build.sh ]] && . post-build.sh || :'

    - name: Prepare ${{ matrix.device }} artifact
      run: |
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" "${{ matrix.device }}.bin"
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Upload ${{ matrix.device }} artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.device }}_firmware_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ matrix.device }}.bin
          build.config

    - name: Check ${{ matrix.device }} firmware size
      run: |
        partitions=padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/${{ matrix.device }}/partitions.config
        if [ ! -f "$partitions" ]; then
          partitions=padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config
        fi
        
        if [ -f "$partitions" ]; then
          max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
          fw_size="$(stat -c %s "${{ matrix.device }}.bin")"

          if ((fw_size > max_fw_size)); then
            fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
            max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
            echo "Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for ${{ matrix.device }}"
            exit 1
          fi
        else
          echo "Warning: partitions.config not found for ${{ matrix.device }}, skipping size check"
        fi

  create-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          **/*.bin
        generate_release_notes: true