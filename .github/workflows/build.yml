name: Build Padavan Firmware

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        device:
          - name: "ASUS RT-N11P (Revision A1)"
            config_file: "rt-n11p-fix.config"
            board: "RT-N11P"
          - name: "ASUS RT-N11P B1 (Revision B1)"
            config_file: "rt-n11pb1-fix.config"
            board: "RT-N11PB1"
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            wget \
            tar \
            zstd \
            libncurses5-dev \
            gawk \
            gettext \
            python3
      
      - name: Load variables
        id: load-vars
        run: |
          if [ ! -f "variables" ]; then
            echo "ERROR: variables file not found"
            exit 1
          fi
          
          # Load variables safely
          while IFS='=' read -r key value; do
            # Skip comments and empty lines
            [[ $key =~ ^#.*$ ]] || [[ -z $key ]] && continue
            
            # Remove quotes and export
            value="${value%\"}"
            value="${value#\"}"
            echo "$key=$value" >> $GITHUB_ENV
          done < variables
          
          echo "Variables loaded"
      
      - name: Clone Padavan-NG
        run: |
          echo "Cloning Padavan-NG..."
          git clone --branch "$PADAVAN_BRANCH" --depth 1 "$PADAVAN_REPO" padavan-ng
      
      - name: Download toolchain
        run: |
          cd padavan-ng
          wget -O toolchain.tzst "$PADAVAN_TOOLCHAIN_URL"
          tar --zstd -xf toolchain.tzst
          rm toolchain.tzst
          cd ..
      
      - name: Build firmware
        run: |
          echo "Building ${{ matrix.device.name }}"
          
          # Copy config
          cp "${{ matrix.device.config_file }}" padavan-ng/trunk/.config
          
          # Build
          cd padavan-ng/trunk
          ./build_firmware.sh
      
      - name: Upload firmware
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.device.board }}
          path: padavan-ng/trunk/images/*.trx
      
      - name: Cleanup
        if: always()
        run: rm -rf padavan-ng