name: ASUS RT-N11P/RT-N11PB1 – Build Padavan Firmware

on:
  workflow_dispatch:
    inputs:
      rev:
        description: 'Hardware revision (B1 or P)'
        required: true
        default: 'B1'
        type: choice
        options:
          - B1
          - P

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Get all commits and tags

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git wget python3 p7zip-full

      - name: Clone Padavan source
        run: |
          git clone https://bitbucket.org/padavan/rt-n56u.git padavan
          cd padavan
          git checkout -f $(git describe --tags)

      - name: Prepare toolchain
        run: |
          cd padavan/toolchain
          ./clean_sources
          ./build_toolchain

      - name: Build firmware
        id: build
        run: |
          cd padavan/trunk
          
          # Determine model based on revision
          if [ "${{ github.event.inputs.rev }}" = "B1" ]; then
            MODEL="RT-N11PB1"
          else
            MODEL="RT-N11P"
          fi
          
          echo "MODEL=$MODEL" >> $GITHUB_ENV
          echo "Building for: $MODEL"
          
          # Build firmware
          ./build_firmware $MODEL
          
          # Get firmware version from commit
          FIRMWARE_VERSION=$(git -C ../../ describe --tags --always | sed 's/^v//')
          echo "FIRMWARE_VERSION=$FIRMWARE_VERSION" >> $GITHUB_ENV
          
          # Get current date and time
          BUILD_DATE=$(date +'%Y.%m.%d')
          BUILD_TIME=$(date +'%H.%M.%S')
          echo "BUILD_DATE=$BUILD_DATE" >> $GITHUB_ENV
          echo "BUILD_TIME=$BUILD_TIME" >> $GITHUB_ENV

      - name: Prepare build.config
        run: |
          cat > build.config << EOF
# Build configuration
MODEL=${{ env.MODEL }}
REVISION=${{ github.event.inputs.rev }}
VERSION=${{ env.FIRMWARE_VERSION }}
BUILD_DATE=${{ env.BUILD_DATE }}
BUILD_TIME=${{ env.BUILD_TIME }}
COMMIT_HASH=${{ github.sha }}
BUILD_URL=${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
EOF
          cat build.config

      - name: Create firmware archive
        run: |
          cd padavan/trunk/images
          
          # Find .trx file for our model
          TRX_FILE=$(ls *.trx | grep -i "${{ env.MODEL }}" | head -1)
          
          if [ -z "$TRX_FILE" ]; then
            TRX_FILE=$(ls *.trx | head -1)
          fi
          
          echo "Found firmware file: $TRX_FILE"
          
          # Copy files to temporary folder
          mkdir -p /tmp/firmware_package
          cp "$TRX_FILE" /tmp/firmware_package/
          cp ../../../build.config /tmp/firmware_package/
          
          # Form archive name
          ARCHIVE_NAME="ASUS_${{ env.MODEL }}_Padavan_${{ env.FIRMWARE_VERSION }}_${{ env.BUILD_DATE }}_${{ env.BUILD_TIME }}.zip"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV
          
          # Create archive
          cd /tmp/firmware_package
          zip -r "$ARCHIVE_NAME" .
          
          # Move archive to workspace
          mv "$ARCHIVE_NAME" "$GITHUB_WORKSPACE/"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          path: ${{ github.workspace }}/${{ env.ARCHIVE_NAME }}