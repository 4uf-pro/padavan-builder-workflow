name: ASUS RT-N11P/RT-N11PB1 – Build Padavan Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        revision: [P, B1]
        include:
          - revision: P
            model: RT-N11P
            config: rt-n11p-fix.config
          - revision: B1
            model: RT-N11PB1
            config: rt-n11pb1-fix.config
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Load configuration files
        run: |
          echo "MODEL=${{ matrix.model }}" >> $GITHUB_ENV
          echo "CONFIG_FILE=${{ matrix.config }}" >> $GITHUB_ENV
          echo "Building model: $MODEL with configuration: $CONFIG_FILE"

          # Load variables file
          if [ -f variables ]; then
            sed -i 's|\r$||g' variables
            source <(cat variables)

            # Export PADAVAN_* variables to environment
            for var in "${!PADAVAN_@}"; do
              echo "$var=${!var}" >> $GITHUB_ENV
            done
          fi

          # Load device-specific configuration
          if [ -f "$CONFIG_FILE" ]; then
            sed -i 's|\r$||g' "$CONFIG_FILE"
            source <(cat "$CONFIG_FILE")

            # Export CONFIG_* variables to environment
            for var in "${!CONFIG_@}"; do
              echo "$var=${!var}" >> $GITHUB_ENV
            done
          fi

          # Create combined build configuration
          cat variables "$CONFIG_FILE" > build.config
          echo "Created build.config from variables and $CONFIG_FILE"

      - name: Clone Padavan source code
        run: |
          git config --global --add safe.directory '*'
          git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO" padavan-ng

          if [ -n "$PADAVAN_COMMIT" ]; then
            git -C padavan-ng checkout "$PADAVAN_COMMIT"
          else
            git -C padavan-ng checkout -f $(git -C padavan-ng describe --tags)
          fi

      - name: Install user interface themes
        run: |
          if [[ -n "$PADAVAN_THEMES" && -n "$PADAVAN_THEMES_REPO" ]]; then
            git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
            cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

            for theme in $PADAVAN_THEMES; do
              echo "Installing theme: $theme"
              cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
            done
          fi

      - name: Execute pre-build script
        run: '[[ -f pre-build.sh ]] && source pre-build.sh || :'

      - name: Compile firmware
        run: |
          cp build.config padavan-ng/trunk/.config
          cd padavan-ng/trunk

          ./clear_tree.sh
          ./build_firmware.sh

          FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                          -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"

          if [ -z "$FW_FILE_NAME" ]; then
            echo "Firmware file not found"
            exit 1
          fi

          echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV
          echo "Built firmware: $FW_FILE_NAME"

      - name: Execute post-build script
        run: '[[ -f post-build.sh ]] && source post-build.sh || :'

      - name: Create firmware package
        run: |
          cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
          cp "$CONFIG_FILE" selected-config.config

          BUILD_DATE=$(date '+%Y.%m.%d')
          BUILD_TIME=$(date '+%H.%M.%S')

          # Extract firmware version from filename
          FW_VERSION=$(echo "$FW_FILE_NAME" | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+[^.]*' | head -1)
          if [ -z "$FW_VERSION" ]; then
            FW_VERSION="${{ github.sha:0:8 }}"
          fi

          ARCHIVE_NAME="ASUS_${{ env.MODEL }}_Padavan_${FW_VERSION}_${BUILD_DATE}_${BUILD_TIME}.zip"
          echo "ARCHIVE_NAME=$ARCHIVE_NAME" >> $GITHUB_ENV

          zip "$ARCHIVE_NAME" "$FW_FILE_NAME" build.config "$CONFIG_FILE" variables

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}
          retention-days: 90
          path: ${{ env.ARCHIVE_NAME }}

      - name: Verify firmware size
        run: |
          partitions="padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"

          if [ -f "$partitions" ]; then
            max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
            fw_size="$(stat -c %s "$FW_FILE_NAME")"

            if ((fw_size > max_fw_size)); then
              echo "WARNING: Firmware size ($fw_size bytes) exceeds maximum limit ($max_fw_size bytes)"
            else
              echo "Firmware size verification passed: $fw_size bytes"
            fi
          fi