name: ASUS RT-N11P/RT-N11PB1 Build Padavan Firmware

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      firmware_version: ${{ steps.get_version.outputs.firmware_version }}
      commit_short: ${{ steps.get_commit.outputs.commit_short }}
      build_timestamp: ${{ steps.get_timestamp.outputs.build_timestamp }}
    steps:
      - name: Get commit hash
        id: get_commit
        run: echo "commit_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      
      - name: Get timestamp
        id: get_timestamp
        run: echo "build_timestamp=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_OUTPUT
      
      - name: Get firmware version from sources
        id: get_version
        run: |
          # Клонируем репозиторий для получения версии
          git clone --depth 1 -b master https://gitlab.com/hadzhioglu/padavan-ng.git tmp-sources
          VERSION_FILE="tmp-sources/trunk/configs/templates/Kernel.config"
          
          if [[ -f "$VERSION_FILE" ]]; then
            # Ищем версию в формате 3.4.3.9-xxx
            FIRMWARE_VERSION=$(grep -oP 'CONFIG_FIRMWARE_VERSION="\K[^"]+' "$VERSION_FILE" || \
                               grep -oP 'CONFIG_FIRMWARE_PRODUCT_ID="\K[^"]+' "$VERSION_FILE" | head -1)
            
            # Если не нашли, используем дефолтную версию
            if [[ -z "$FIRMWARE_VERSION" ]]; then
              FIRMWARE_VERSION="3.4.3.9L-102"
            fi
            
            echo "firmware_version=$FIRMWARE_VERSION" >> $GITHUB_OUTPUT
            echo "Found firmware version: $FIRMWARE_VERSION"
          else
            echo "firmware_version=3.4.3.9L-102" >> $GITHUB_OUTPUT
            echo "Using default firmware version: 3.4.3.9L-102"
          fi

  build-rt-n11p:
    needs: prepare
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    steps:
    - uses: actions/checkout@v4

    - name: Get variables
      run: |
        sed -i 's|\r$||g' variables rt-n11p-fix.config
        . <(cat variables rt-n11p-fix.config)
        PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
        for v in "${!PADAVAN_@}" "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    - name: Download sources and toolchain
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

    - name: Get actual firmware version
      run: |
        # Получаем актуальную версию из собранных исходников
        VERSION_FILE="padavan-ng/trunk/configs/templates/Kernel.config"
        if [[ -f "$VERSION_FILE" ]]; then
          FIRMWARE_VERSION=$(grep -oP 'CONFIG_FIRMWARE_VERSION="\K[^"]+' "$VERSION_FILE" 2>/dev/null || echo "${{ needs.prepare.outputs.firmware_version }}")
        else
          FIRMWARE_VERSION="${{ needs.prepare.outputs.firmware_version }}"
        fi
        
        # Удаляем лишние символы для использования в имени файла
        CLEAN_VERSION=$(echo "$FIRMWARE_VERSION" | sed 's/[^a-zA-Z0-9._-]//g')
        echo "FIRMWARE_VERSION=$FIRMWARE_VERSION" >> $GITHUB_ENV
        echo "CLEAN_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV

    - name: Install themes
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

          for theme in $PADAVAN_THEMES; do
            echo "Installing $theme theme"
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Run custom pre-build script
      run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

    - name: Build firmware
      run: |
        cp rt-n11p-fix.config padavan-ng/trunk/.config
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV

    - name: Run custom post-build script
      run: '[[ -f post-build.sh ]] && . post-build.sh || :'

    - name: Check firmware size
      run: |
        partitions=padavan-ng/trunk/configs/boards/$CONFIG_VENDOR/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config
        max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
        fw_size="$(stat -c %s "$FW_FILE_NAME")"

        if ((fw_size > max_fw_size)); then
          fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
          max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
          echo "Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for your target device"
          exit 1
        fi

    - name: Rename firmware file
      run: |
        # Извлекаем базовое имя файла (без расширения)
        BASE_NAME="${FW_FILE_NAME%.*}"
        EXTENSION="${FW_FILE_NAME##*.}"
        
        # Формируем новое имя с версией прошивки и хэшем коммита
        NEW_FW_NAME="${BASE_NAME}_${CLEAN_VERSION}-${{ needs.prepare.outputs.commit_short }}.$EXTENSION"
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" "$NEW_FW_NAME"
        echo "NEW_FW_NAME=$NEW_FW_NAME" >> $GITHUB_ENV

    - name: Create zip archive
      run: |
        ZIP_NAME="ASUS_RT-N11P_Padavan_${CLEAN_VERSION}-${{ needs.prepare.outputs.commit_short }}_${{ needs.prepare.outputs.build_timestamp }}.zip"
        echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV
        zip "$ZIP_NAME" "$NEW_FW_NAME" rt-n11p-fix.config

    - name: Upload RT-N11P artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        retention-days: 7
        path: ${{ env.ZIP_NAME }}

  build-rt-n11pb1:
    needs: prepare
    runs-on: ubuntu-latest
