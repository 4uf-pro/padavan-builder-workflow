name: Build Padavan firmware for ASUS RT-N11P and RT-N11P B1

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build-rt-n11p:
    name: Build RT-N11P (MT7620)
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 1

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y unzip zlib1g-dev liblzo2-dev uuid-dev liblzma-dev \
        libmagic-dev pkg-config gperf kmod fakechroot curl git wget python3 python3-pip \
        bc mc g++ flex bison gawk make libncurses5-dev gettext texinfo libtool \
        autopoint kmod libssl-dev build-essential g++-multilib
    
    - name: Setup config for RT-N11P
      run: |
        cp configs/rt-n11p-fix.config build.config
        sed -i 's|\r$||g' variables build.config
        . <(cat variables build.config)
        for v in "${!PADAVAN_@}" "${!CONFIG_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done
    
    - name: Download sources and toolchain
      run: |
        rm -rf padavan-ng
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" --depth 1 "$PADAVAN_REPO" padavan-ng
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -
        TOOLCHAIN_DIR=$(find padavan-ng -type d -name "toolchain" 2>/dev/null | grep -v ".git" | head -1)
        if [[ -n "$TOOLCHAIN_DIR" ]] && [[ "$TOOLCHAIN_DIR" != "padavan-ng/trunk/toolchain" ]]; then
          mkdir -p padavan-ng/trunk/toolchain
          cp -r "$TOOLCHAIN_DIR"/* padavan-ng/trunk/toolchain/
        fi
    
    - name: Install themes
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed
          for theme in $PADAVAN_THEMES; do
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi
    
    - name: Build firmware
      timeout-minutes: 60
      run: |
        cp build.config padavan-ng/trunk/.config
        cd padavan-ng/trunk
        if grep -q "CONFIG_FIRMWARE_INCLUDE_L2TP=n" .config; then
          sed -i 's/dir_v_l2tp=l2tp/dir_v_l2tp=/g' user/Makefile
        fi
        if grep -q "CONFIG_FIRMWARE_INCLUDE_PPTP=n" .config; then
          sed -i 's/dir_v_pptp=pptp/dir_v_pptp=/g' user/Makefile
        fi
        mkdir -p configs/templates
        cp .config configs/templates/MT7620.config
        ./clear_tree.sh
        cp configs/templates/MT7620.config .config
        ./build_firmware.sh
        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { exit 1; }
        echo "FW_FILE_NAME=$FW_FILE_NAME" >> $GITHUB_ENV
    
    - name: Prepare artifacts
      run: |
        cp "padavan-ng/trunk/images/$FW_FILE_NAME" .
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ASUS_RT-N11P_Padavan_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ env.FW_FILE_NAME }}
          build.config

  build-rt-n11pb1:
    name: Build RT-N11PB1 (MT7628)
