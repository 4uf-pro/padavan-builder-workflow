name: Build firmware for ASUS RT-N11P and RT-N11P B1

on:
  workflow_dispatch:
  push:
    tags:
      - '*'

jobs:
  build:
    runs-on: ubuntu-latest
    container: registry.gitlab.com/hadzhioglu/padavan-ng
    defaults: { run: { shell: bash } }
    strategy:
      matrix:
        config: [rt-n11p-fix.config, rt-n11pb1-fix.config]
    steps:
    - uses: actions/checkout@v4

    - name: Get variables
      run: |
        sed -i 's|\r$||g' variables
        . <(cat variables)
        PADAVAN_THEMES="${PADAVAN_THEMES[*]}"
        for v in "${!PADAVAN_@}"; do
          echo "$v=${!v}" >> $GITHUB_ENV
        done

    - name: Download sources and toolchain
      run: |
        git config --global --add safe.directory '*'
        git clone -b "$PADAVAN_BRANCH" "$PADAVAN_REPO"
        git -C padavan-ng checkout "$PADAVAN_COMMIT"
        wget -qO- "$PADAVAN_TOOLCHAIN_URL" | tar -C padavan-ng --zstd -xf -

    - name: Install themes
      run: |
        if [[ -n $PADAVAN_THEMES ]]; then
          git clone --depth 1 -b "$PADAVAN_THEMES_BRANCH" "$PADAVAN_THEMES_REPO" themes
          cp -r themes/common-theme themes/jquery.js padavan-ng/trunk/user/www/n56u_ribbon_fixed

          for theme in $PADAVAN_THEMES; do
            echo "Installing $theme theme"
            cp -r "themes/$theme-theme" padavan-ng/trunk/user/www/n56u_ribbon_fixed
          done
        fi

    - name: Run custom pre-build script
      run: '[[ -f pre-build.sh ]] && . pre-build.sh || :'

    - name: Build firmware for ${{ matrix.config }}
      run: |
        # Используем соответствующий конфиг
        CONFIG_FILE="${{ matrix.config }}"
        echo "Building with config: $CONFIG_FILE"
        
        # Копируем нужный конфиг
        cp "$CONFIG_FILE" padavan-ng/trunk/.config
        
        # Получаем Product ID для имени файла
        . <(grep '^CONFIG_FIRMWARE_PRODUCT_ID=' "$CONFIG_FILE")
        echo "PRODUCT_ID=${CONFIG_FIRMWARE_PRODUCT_ID}" >> $GITHUB_ENV
        
        cd padavan-ng/trunk
        ./clear_tree.sh
        ./build_firmware.sh

        # Находим собранный файл прошивки
        FW_FILE_NAME="$(find images -type f -regextype posix-extended -iregex ".*\.(trx|bin)$" \
                        -printf "%T@\t%f\n" | sort -V | tail -1 | cut -f2)"
        [[ -n $FW_FILE_NAME ]] || { echo "Firmware file not found"; exit 1; }
        
        # Переименовываем файл с Product ID
        NEW_FW_NAME="${CONFIG_FIRMWARE_PRODUCT_ID}_${FW_FILE_NAME}"
        mv "images/$FW_FILE_NAME" "images/$NEW_FW_NAME"
        echo "NEW_FW_NAME=$NEW_FW_NAME" >> $GITHUB_ENV
        echo "PRODUCT_ID=$CONFIG_FIRMWARE_PRODUCT_ID" >> $GITHUB_ENV

    - name: Run custom post-build script
      run: '[[ -f post-build.sh ]] && . post-build.sh || :'

    - name: Check firmware size for ${{ matrix.config }}
      run: |
        . <(grep '^CONFIG_FIRMWARE_PRODUCT_ID=' "${{ matrix.config }}")
        partitions="padavan-ng/trunk/configs/boards/ASUS/$CONFIG_FIRMWARE_PRODUCT_ID/partitions.config"
        
        if [[ -f "$partitions" ]]; then
          max_fw_size="$(awk '/Firmware/ { getline; getline; sub(",", ""); print strtonum($2); }' "$partitions")"
          fw_size="$(stat -c %s "padavan-ng/trunk/images/$NEW_FW_NAME")"

          if ((fw_size > max_fw_size)); then
            fw_size_fmtd="$(numfmt --grouping "$fw_size") bytes"
            max_fw_size_fmtd="$(numfmt --grouping "$max_fw_size") bytes"
            echo "ERROR: Firmware size ($fw_size_fmtd) exceeds max size ($max_fw_size_fmtd) for $CONFIG_FIRMWARE_PRODUCT_ID"
            exit 1
          else
            echo "OK: Firmware size ($(numfmt --grouping "$fw_size") bytes) within limits ($(numfmt --grouping "$max_fw_size") bytes)"
          fi
        else
          echo "WARNING: partitions.config not found for $CONFIG_FIRMWARE_PRODUCT_ID, skipping size check"
        fi

    - name: Prepare artifacts for ${{ matrix.config }}
      run: |
        cp "padavan-ng/trunk/images/$NEW_FW_NAME" .
        echo "BUILD_TIMESTAMP=$(date '+%Y.%m.%d_%H.%M.%S')" >> $GITHUB_ENV

    - name: Upload artifacts for ${{ matrix.config }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.PRODUCT_ID }}_padavan_${{ env.BUILD_TIMESTAMP }}
        retention-days: 7
        path: |
          ${{ env.NEW_FW_NAME }}
          ${{ matrix.config }}